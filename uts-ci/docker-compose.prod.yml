services:
  app:
    build: .
    container_name: ci-app
    deploy:
      resources:
        limits:
          memory: 500m
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - CI_ENVIRONMENT=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.project.rule=Host('project.izfaha.my.id')"
      - "traefik.http.routers.project.entrypoints.websecure=true"
      - "traefik.http.routers.project.tls=true"
      - "traefik.http.routers.project.tls.certresolver=cloudflare"
    depends_on:
      db: 
        condition: service_healthy
    
  db:
    image: mysql:8.0
    container_name: db_app
    restart: always
    environment:
      MYSQL_DATABASE: db_project
      MYSQL_USER: dylan
      MYSQL_PASSWORD: dylan123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3033:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dylan", "-pdylan123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: