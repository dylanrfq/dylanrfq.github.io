services:
  app:
    build: .
    container_name: utsci-app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - CI_ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: utsci-db
    restart: always
    environment:
      MYSQL_DATABASE: db_project
      MYSQL_USER: dylan
      MYSQL_PASSWORD: dylan123
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3033:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dylan", "-pdylan123"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
